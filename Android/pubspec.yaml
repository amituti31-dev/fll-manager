name: fll_manager
description: FLL Team Manager - Unearthed 2026
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^7.0.0

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # UI
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0

  # Media
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.20.0
  uuid: ^4.3.3
  timezone: ^0.9.4
  flutter_local_notifications: ^17.0.0

  # Export
  pdf: ^3.10.8
  printing: ^5.13.1
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

dependency_overrides:
  record_linux: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
